---
description: >
  Main stage of the improved code install on the agent: rework how module code reaches agents. We now make a distinction
  for modules installed in the venv of the compiler if they were installed in editable mode or as a package.
  To install these modules on the agent:
    - For modules installed in editable mode, the existing code transport mechanism is mostly reused
    - For modules installed as a package, we now rely on pip
  This PR adds a compatibility layer in the code install/loading mechanism to be able to deploy/dryrun model versions
  that were exported using an iso<10 orchestrator. This compatibility layer can be dropped in iso11.
change-type: major
destination-branches: [master]
sections:
  upgrade-note: >
    - The mechanism to transport and install code on the agents has been reworked. Please make sure to run a full
      compile after upgrading the orchestrator.
    - The deprecated 'agent_install_dependency_modules' setting in the project.yml file has been removed.

