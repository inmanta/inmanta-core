---
description: >
  Main stage of the improved code install on the agent: rework how module code reaches agents. Split the old single
  'for_agents' notion into 'install-on-agent' vs 'load-on-agent', and distinguish
  editable-install modules (source stored in the DB, written to disk on all agents, imported only on agents that use them) from
  package-install modules (pip-installed via a synthesized inmanta-module-*==version requirement).
change-type: major
destination-branches: [master]
sections:
  upgrade-note: >
  The deprecated 'agent_install_dependency_modules' setting in the project.yml file has been removed.

