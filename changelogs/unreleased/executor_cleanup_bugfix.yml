description: >
  Fix two issues with the cleanup of agent executors.
  - Idle executor processes were no longer cleaned up after the agent reconnected to the server (for example after a lost connection), so executor processes could pile
  up and keep consuming memory over time.
  - An executor's inactivity timer was measured from when it was created instead of from its last use, so regularly used executors were shut down and rebuilt more often
  than the configured retention time, adding avoidable deployment latency.
change-type: patch
destination-branches: [master, iso9, iso8]
bugfix: >
  Fix two agent executor cleanup issues: idle executors were no longer cleaned up after the agent reconnected
  to the server (leaking executor processes), and regularly used executors were rebuilt more often than the
  configured retention time, adding avoidable deployment latency.
