---
description: >
  Speed up the ``Resource.reset_resource_state`` query that runs at scheduler
  startup. It used to issue an env-wide ``UPDATE resource_persistent_state SET
  is_deploying=FALSE WHERE environment=$1``, which sequentially scanned the
  environment and acquired a row-level lock on every row; under load that
  queued the executor's per-row UPDATEs behind it (multi-second ``ShareLock``
  waits on large environments). The query now also requires
  ``AND is_deploying=TRUE`` so it touches and locks only the actually-deploying
  rows.
change-type: patch
destination-branches: [master, iso9]
