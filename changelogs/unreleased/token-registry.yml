description: >-
  Add a token registry so user-created API tokens can be listed and individually revoked without
  rotating the signing key. Non-idempotent tokens created via environment_create_token now carry a jti
  claim and are recorded in a new token table, and are rejected once revoked. Idempotent (reproducible)
  tokens, agent/compiler service tokens and existing tokens without a jti keep their stateless,
  signature-only validation, so the change is non-breaking. The new environment_token_list and
  environment_token_revoke API endpoints expose the registry.
change-type: minor
destination-branches:
  - master
  - iso9
