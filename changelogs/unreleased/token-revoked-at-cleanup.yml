description: >-
  Record when an API token was revoked (revoked_at, exposed via environment_token_list) and periodically
  delete revoked tokens from the token registry once they have been revoked for longer than the new
  server.revoked-token-retention option (default thirty days).
issue-nr: 10572
change-type: minor
destination-branches:
  - master
  - iso9
sections:
  feature: >
    The token registry now records when a token was revoked (revoked_at, exposed via
    environment_token_list). Revoked tokens are kept for auditing and automatically deleted once they
    have been revoked for longer than the new server.revoked-token-retention option (default thirty
    days); previously they stayed in the registry forever.
